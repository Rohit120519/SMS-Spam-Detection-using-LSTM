<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{% static 'Spam/Css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'Spam/Css/Style.css' %}">
    <link rel="stylesheet" href="{% static 'Spam/Css/radio.css' %}">
    <title>Answer</title>
</head>
<style>
    body {
      background-image: url('https://plus.unsplash.com/premium_photo-1714618835760-5b2175ad3249?q=80&w=1789&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
      background-repeat: no-repeat;
      background-attachment: fixed;  
      background-size: cover;
    }
    </style>

<body>
    <!-- Main Section Start -->
    <section class="AnswerSection">
        <p class="answer" style="position: absolute; bottom: 50%; left: 50%; transform: translateX(-50%); font-size: 24px; color: blue; text-align: center;">
            {% if answer == "ham" %} Not Spam {% else %} Spam {% endif %}
        </p>
        
        
        <a href="/" class="backbtn">Back</a>
    </section>
    <!-- Main Section End -->
    <script src="./Js/JQuery.js"></script>
    <script src="./Js/Bootstrap.min.js"></script>
    <script src="./Js/Main.js"></script>
</body>

</html>
